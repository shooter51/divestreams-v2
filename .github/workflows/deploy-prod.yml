name: Deploy Production

# On push to main: retag :test → :latest, deploy to Production VPS.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shooter51/divestreams-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag :test → :latest
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/vps_key
          echo "" >> ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync compose and Caddyfile
        run: |
          scp -i ~/.ssh/vps_key docker-compose.prod.yml root@${{ vars.PROD_VPS_IP }}:/docker/divestreams-prod/docker-compose.yml
          scp -i ~/.ssh/vps_key Caddyfile root@${{ vars.PROD_VPS_IP }}:/docker/divestreams-prod/Caddyfile

      - name: Deploy via Hostinger API
        run: |
          curl -X POST \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/${{ vars.PROD_VPS_ID }}/docker/divestreams-prod/update" \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --fail

      - name: Wait for containers
        run: |
          EXPECTED=5
          VPS_ID=${{ vars.PROD_VPS_ID }}
          for i in $(seq 1 15); do
            echo "Check $i/15..."
            RESPONSE=$(curl -s \
              "https://developers.hostinger.com/api/vps/v1/virtual-machines/${VPS_ID}/docker/divestreams-prod/containers" \
              -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}")
            RUNNING=$(echo "$RESPONSE" | jq '[.[] | select(.state == "running")] | length')
            echo "  Running: $RUNNING/$EXPECTED"
            if [ "$RUNNING" -ge "$EXPECTED" ]; then
              echo "All containers running"
              exit 0
            fi
            if [ "$i" -eq "15" ]; then
              echo "ERROR: Expected $EXPECTED containers, found $RUNNING after 150s"
              exit 1
            fi
            sleep 10
          done

      - name: Verify production health
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://divestreams.com/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "Production is healthy!"
          else
            echo "WARNING: Health check returned $STATUS"
          fi

      - name: Summary
        run: |
          echo "### Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://divestreams.com" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/vps_key
