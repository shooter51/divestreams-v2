name: Backup Database

# Daily at 2 AM UTC: pg_dump both databases to S3 (30-day retention).
# Weekly on Sundays at 3 AM UTC: pg_basebackup to S3 (required for PITR).
# Manual trigger available for ad-hoc backups.

on:
  schedule:
    - cron: '0 2 * * *'   # daily dump
    - cron: '0 3 * * 0'   # weekly base backup (Sundays)
  workflow_dispatch:
    inputs:
      run_base_backup:
        description: 'Also run a base backup (in addition to the daily dump)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: backup-db
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/vps_key
          echo "" >> ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Run daily database dump
        env:
          SSH_KEY_FILE: ~/.ssh/vps_key
          DB_VPS_IP: ${{ vars.DB_VPS_IP }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          chmod +x scripts/infra/backup-db-s3.sh
          scripts/infra/backup-db-s3.sh

      - name: Run weekly base backup (WAL PITR)
        # Run on the Sunday schedule (cron '0 3 * * 0') or when manually requested
        if: >-
          (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0') ||
          (github.event_name == 'workflow_dispatch' && inputs.run_base_backup == 'true')
        env:
          SSH_KEY_FILE: ~/.ssh/vps_key
          DB_VPS_IP: ${{ vars.DB_VPS_IP }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          # Run base-backup.sh on the DB VPS via SSH.
          # Credentials are already written to /etc/wal-archive.env by setup-wal-archiving.sh.
          # We pass them explicitly here as well so the script works even if the env file
          # has not been written yet (e.g. first run before setup-wal-archiving.sh ran).
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/vps_key \
            root@${{ vars.DB_VPS_IP }} \
            env \
              S3_BUCKET="${{ secrets.S3_BUCKET }}" \
              S3_REGION="${{ secrets.S3_REGION }}" \
              S3_ACCESS_KEY_ID="${{ secrets.S3_ACCESS_KEY_ID }}" \
              S3_SECRET_ACCESS_KEY="${{ secrets.S3_SECRET_ACCESS_KEY }}" \
              S3_ENDPOINT="${{ secrets.S3_ENDPOINT }}" \
              /usr/local/bin/base-backup.sh

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/vps_key

      - name: Summary
        if: always()
        run: |
          IS_SUNDAY="${{ github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0' }}"
          MANUAL_BASE="${{ github.event_name == 'workflow_dispatch' && inputs.run_base_backup == 'true' }}"

          echo "### Database Backup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "**Databases:** divestreams, divestreams_test" >> $GITHUB_STEP_SUMMARY
          echo "**Daily dump retention:** 30 days" >> $GITHUB_STEP_SUMMARY
          if [[ "$IS_SUNDAY" == "true" || "$MANUAL_BASE" == "true" ]]; then
            echo "**Base backup (PITR):** uploaded to s3://${{ secrets.S3_BUCKET }}/base/" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Bucket:** ${{ secrets.S3_BUCKET }}" >> $GITHUB_STEP_SUMMARY
