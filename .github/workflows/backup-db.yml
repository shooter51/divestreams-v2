name: Backup Database

# Runs daily at 2 AM UTC. Dumps both production and test databases,
# uploads compressed backups to S3, and rotates backups older than 30 days.
# Manual trigger also available for ad-hoc backups.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: backup-db
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/vps_key
          echo "" >> ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Run database backup
        env:
          SSH_KEY_FILE: ~/.ssh/vps_key
          DB_VPS_IP: ${{ vars.DB_VPS_IP }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          chmod +x scripts/infra/backup-db-s3.sh
          scripts/infra/backup-db-s3.sh

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/vps_key

      - name: Summary
        if: always()
        run: |
          echo "### Database Backup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "**Databases:** divestreams, divestreams_test" >> $GITHUB_STEP_SUMMARY
          echo "**Retention:** 30 days" >> $GITHUB_STEP_SUMMARY
          echo "**Bucket:** ${{ secrets.S3_BUCKET }}" >> $GITHUB_STEP_SUMMARY
