name: Extract Secrets
on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: [self-hosted, linux, divestreams]
    steps:
      - name: Extract all secrets
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_REGION: ${{ secrets.B2_REGION }}
          CDN_URL: ${{ secrets.CDN_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          ORCHESTRATOR_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PLATFORM_ADMIN_EMAIL: ${{ secrets.PLATFORM_ADMIN_EMAIL }}
          PLATFORM_ADMIN_NAME: ${{ secrets.PLATFORM_ADMIN_NAME }}
          PRODUCTION_BETTER_AUTH_SECRET: ${{ secrets.PRODUCTION_BETTER_AUTH_SECRET }}
          PROMOTION_PAT: ${{ secrets.PROMOTION_PAT }}
          RUNNER_ACCESS_TOKEN: ${{ secrets.RUNNER_ACCESS_TOKEN }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          STAGING_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
          STAGING_AUTH_SECRET: ${{ secrets.STAGING_AUTH_SECRET }}
          STAGING_BETTER_AUTH_SECRET: ${{ secrets.STAGING_BETTER_AUTH_SECRET }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_NODE_ENV: ${{ secrets.STAGING_NODE_ENV }}
          STAGING_SMTP_FROM: ${{ secrets.STAGING_SMTP_FROM }}
          STAGING_SMTP_HOST: ${{ secrets.STAGING_SMTP_HOST }}
          STAGING_SMTP_PASS: ${{ secrets.STAGING_SMTP_PASS }}
          STAGING_SMTP_PORT: ${{ secrets.STAGING_SMTP_PORT }}
          STAGING_SMTP_USER: ${{ secrets.STAGING_SMTP_USER }}
          STAGING_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STAGING_STRIPE_PUBLISHABLE_KEY }}
          STAGING_STRIPE_SECRET_KEY: ${{ secrets.STAGING_STRIPE_SECRET_KEY }}
          STAGING_VPS_SSH_KEY: ${{ secrets.STAGING_VPS_SSH_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TEST_VPS_SSH_KEY: ${{ secrets.TEST_VPS_SSH_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WILBER_SSH_PRIVATE_KEY: ${{ secrets.WILBER_SSH_PRIVATE_KEY }}
        run: |
          python3 -c "
          import json, os, base64

          keys = [
              'ADMIN_PASSWORD', 'AUTH_SECRET', 'B2_APP_KEY', 'B2_BUCKET',
              'B2_ENDPOINT', 'B2_KEY_ID', 'B2_REGION', 'CDN_URL',
              'CLOUDFLARE_API_TOKEN', 'DB_PASSWORD', 'HOSTINGER_API_TOKEN',
              'JIRA_API_TOKEN', 'JIRA_HOST', 'JIRA_PROJECT_KEY', 'JIRA_USER_EMAIL',
              'ORCHESTRATOR_TOKEN', 'PACT_BROKER_BASE_URL', 'PLATFORM_ADMIN_EMAIL',
              'PLATFORM_ADMIN_NAME', 'PRODUCTION_BETTER_AUTH_SECRET', 'PROMOTION_PAT',
              'RUNNER_ACCESS_TOKEN', 'S3_ACCESS_KEY_ID', 'S3_BUCKET', 'S3_ENDPOINT',
              'S3_REGION', 'S3_SECRET_ACCESS_KEY', 'SMTP_FROM', 'SMTP_HOST',
              'SMTP_PASS', 'SMTP_PORT', 'SMTP_USER', 'STAGING_ADMIN_PASSWORD',
              'STAGING_AUTH_SECRET', 'STAGING_BETTER_AUTH_SECRET', 'STAGING_DB_PASSWORD',
              'STAGING_NODE_ENV', 'STAGING_SMTP_FROM', 'STAGING_SMTP_HOST',
              'STAGING_SMTP_PASS', 'STAGING_SMTP_PORT', 'STAGING_SMTP_USER',
              'STAGING_STRIPE_PUBLISHABLE_KEY', 'STAGING_STRIPE_SECRET_KEY',
              'STAGING_VPS_SSH_KEY', 'STRIPE_WEBHOOK_SECRET', 'TEST_VPS_SSH_KEY',
              'WEBHOOK_SECRET', 'WILBER_SSH_PRIVATE_KEY'
          ]

          secrets = {}
          for k in keys:
              v = os.environ.get(k, '')
              if v:
                  secrets[k] = v

          payload = json.dumps(secrets, indent=2)
          encoded = base64.b64encode(payload.encode()).decode()

          with open('/tmp/secrets.b64', 'w') as f:
              f.write(encoded)

          print(f'Extracted {len(secrets)} secrets to artifact')
          "

      - name: Upload secrets artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-secrets
          path: /tmp/secrets.b64
          retention-days: 1
