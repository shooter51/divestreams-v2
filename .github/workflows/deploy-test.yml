name: Deploy Test

# On push to test: build + deploy to Test VPS, then run E2E.

on:
  push:
    branches: [test]

concurrency:
  group: deploy-test
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shooter51/divestreams-app

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/vps_key
          echo "" >> ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync compose, Caddyfile, and Alloy config
        run: |
          scp -i ~/.ssh/vps_key docker-compose.test.yml root@${{ vars.TEST_VPS_IP }}:/docker/divestreams-test/docker-compose.yml
          scp -i ~/.ssh/vps_key Caddyfile.test root@${{ vars.TEST_VPS_IP }}:/docker/divestreams-test/Caddyfile.test
          scp -i ~/.ssh/vps_key config/alloy/config.alloy root@${{ vars.TEST_VPS_IP }}:/docker/divestreams-test/alloy-config.alloy

      - name: Deploy via Hostinger API
        run: |
          curl -X POST \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/${{ vars.TEST_VPS_ID }}/docker/divestreams-test/update" \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --fail

      - name: Wait for containers
        run: |
          EXPECTED=6
          VPS_ID=${{ vars.TEST_VPS_ID }}
          for i in $(seq 1 15); do
            echo "Check $i/15..."
            RESPONSE=$(curl -s \
              "https://developers.hostinger.com/api/vps/v1/virtual-machines/${VPS_ID}/docker/divestreams-test/containers" \
              -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}")
            RUNNING=$(echo "$RESPONSE" | jq '[.[] | select(.state == "running")] | length')
            echo "  Running: $RUNNING/$EXPECTED"
            if [ "$RUNNING" -ge "$EXPECTED" ]; then
              echo "All containers running"
              exit 0
            fi
            if [ "$i" -eq "15" ]; then
              echo "ERROR: Expected $EXPECTED containers, found $RUNNING after 150s"
              exit 1
            fi
            sleep 10
          done

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/vps_key

  e2e:
    needs: build-deploy
    runs-on: ubuntu-latest
    environment: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/vps_key
          echo "" >> ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Fix test data via DB VPS
        run: |
          ssh -i ~/.ssh/vps_key root@${{ vars.DB_VPS_IP }} '
            PG_CONTAINER=$(docker ps --filter name=divestreams-db --format "{{.Names}}" | head -1)
            if [ -n "$PG_CONTAINER" ]; then
              # Fix PRO plan features
              docker exec "$PG_CONTAINER" psql -U divestreams -d divestreams_test -c "
                UPDATE subscription_plans
                SET features = '"'"'{\"has_tours_bookings\":true,\"has_equipment_boats\":true,\"has_training\":true,\"has_pos\":true,\"has_public_site\":true,\"has_advanced_notifications\":true,\"has_integrations\":true,\"has_api_access\":true,\"has_stripe\":true,\"has_google_calendar\":true,\"has_mailchimp\":true,\"has_quickbooks\":true,\"has_zapier\":true,\"has_twilio\":true,\"has_whatsapp\":true,\"has_xero\":true}'"'"'
                WHERE LOWER(name) = '"'"'pro'"'"';
              " 2>/dev/null && echo "PRO plan features updated"
              # Reset stock
              docker exec "$PG_CONTAINER" psql -U divestreams -d divestreams_test -c "
                UPDATE products SET stock_quantity = 50 WHERE stock_quantity = 0;
              " 2>/dev/null && echo "Product stock reset"
              # Ensure e2e org subscriptions
              docker exec "$PG_CONTAINER" psql -U divestreams -d divestreams_test -c "
                INSERT INTO subscription (organization_id, plan, plan_id, status, created_at, updated_at)
                SELECT o.id, '"'"'pro'"'"', sp.id, '"'"'active'"'"', NOW(), NOW()
                FROM organization o
                CROSS JOIN subscription_plans sp
                WHERE o.slug IN ('"'"'e2etest'"'"', '"'"'demo'"'"') AND LOWER(sp.name) = '"'"'pro'"'"'
                AND NOT EXISTS (SELECT 1 FROM subscription s WHERE s.organization_id = o.id)
                ON CONFLICT DO NOTHING;
                UPDATE subscription SET plan = '"'"'pro'"'"', plan_id = sp.id, status = '"'"'active'"'"', updated_at = NOW()
                FROM subscription_plans sp, organization o
                WHERE subscription.organization_id = o.id AND o.slug IN ('"'"'e2etest'"'"', '"'"'demo'"'"') AND LOWER(sp.name) = '"'"'pro'"'"';
              " 2>/dev/null && echo "E2E org subscriptions ensured"
              # Ensure e2e-tester user
              docker exec "$PG_CONTAINER" psql -U divestreams -d divestreams_test -c "
                DO \$\$
                DECLARE v_user_id TEXT; v_demo_org_id TEXT;
                BEGIN
                  SELECT id INTO v_demo_org_id FROM organization WHERE slug = '"'"'demo'"'"' LIMIT 1;
                  IF v_demo_org_id IS NULL THEN RETURN; END IF;
                  SELECT id INTO v_user_id FROM \"user\" WHERE email = '"'"'e2e-tester@demo.com'"'"' LIMIT 1;
                  IF v_user_id IS NULL THEN
                    v_user_id := gen_random_uuid()::TEXT;
                    INSERT INTO \"user\" (id, email, email_verified, name, created_at, updated_at)
                    VALUES (v_user_id, '"'"'e2e-tester@demo.com'"'"', true, '"'"'E2E Test User'"'"', NOW(), NOW());
                    INSERT INTO account (id, user_id, account_id, provider_id, password, created_at, updated_at)
                    VALUES (gen_random_uuid()::TEXT, v_user_id, v_user_id, '"'"'credential'"'"',
                      '"'"'e2e_test_fixed_salt_01:76dce6c4364bd21765ba2f45d9066e7eea88acd36d665ff8f358df77ab784af89a91389eb7cb6cd2c6efed8a2f6661e13dd1a78fe9ffff06e3f45e200a470cf7'"'"',
                      NOW(), NOW());
                  END IF;
                  IF NOT EXISTS (SELECT 1 FROM member WHERE user_id = v_user_id AND organization_id = v_demo_org_id) THEN
                    INSERT INTO member (id, organization_id, user_id, role, created_at, updated_at)
                    VALUES (gen_random_uuid()::TEXT, v_demo_org_id, v_user_id, '"'"'owner'"'"', NOW(), NOW());
                  END IF;
                END \$\$;
              " 2>/dev/null && echo "E2E tester user ensured"
            else
              echo "DB container not found - skipping DB fixes"
            fi
          ' || echo "DB fix failed (non-fatal)"

      - name: Flush rate limits via Test VPS Redis
        run: |
          ssh -i ~/.ssh/vps_key root@${{ vars.TEST_VPS_IP }} '
            REDIS_CONTAINER=$(docker ps --filter name=redis --format "{{.Names}}" | head -1)
            if [ -n "$REDIS_CONTAINER" ]; then
              REDIS_PASS=$(grep "^REDIS_PASSWORD=" /docker/divestreams-test/.env 2>/dev/null | cut -d= -f2 || echo "changeme")
              [ -z "$REDIS_PASS" ] && REDIS_PASS="changeme"
              DELETED=$(docker exec "$REDIS_CONTAINER" redis-cli -a "$REDIS_PASS" --no-auth-warning EVAL "
                local keys = redis.call(\"KEYS\", \"ratelimit:*\")
                for i, key in ipairs(keys) do redis.call(\"DEL\", key) end
                return #keys
              " 0 2>/dev/null || echo "0")
              echo "Flushed $DELETED rate limit keys from Redis"
            else
              echo "Redis container not found - skipping"
            fi
          ' || echo "Rate limit flush failed (non-fatal)"

      - name: Wait for app ready
        run: |
          for i in $(seq 1 30); do
            echo "Health check $i/30..."
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 https://test.divestreams.com/api/health 2>/dev/null || echo "000")
            echo "  HTTP status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "App ready!"
              exit 0
            fi
            if [ "$i" -eq "30" ]; then
              echo "ERROR: App not ready after 300s"
              exit 1
            fi
            sleep 10
          done

      - name: Run E2E tests
        id: e2e
        run: npx playwright test
        env:
          BASE_URL: https://test.divestreams.com
          SKIP_WEB_SERVER: 'true'
          ADMIN_EMAIL: ${{ secrets.PLATFORM_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.PLATFORM_ADMIN_PASSWORD }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 30

      - name: Create issue on failure
        if: failure() && steps.e2e.outcome == 'failure'
        run: |
          gh issue create \
            --title "E2E failure on test deploy (${{ github.sha }})" \
            --body "E2E tests failed after deploying to test.divestreams.com.

          **Commit:** ${{ github.sha }}
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          This does not block deployment — the code is already live on test for QA." \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/vps_key
