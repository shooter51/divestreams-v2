services:
  app:
    image: ghcr.io/shooter51/divestreams-app:test
    container_name: divestreams-test-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://divestreams:${DB_PASSWORD}@${DB_HOST}:5432/divestreams_test
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - AUTH_SECRET=${AUTH_SECRET}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-https://test.divestreams.com}
      - APP_URL=${APP_URL:-https://test.divestreams.com}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_WEBHOOK_SECRET_THIN=${STRIPE_WEBHOOK_SECRET_THIN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@divestreams.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL}
      - PLATFORM_ADMIN_PASSWORD=${PLATFORM_ADMIN_PASSWORD}
      - PLATFORM_ADMIN_NAME=${PLATFORM_ADMIN_NAME:-Platform Admin}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION:-us-west-000}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - CDN_URL=${CDN_URL}
      - DISABLE_RATE_LIMIT=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_SERVICE_NAME=divestreams-app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 8192M
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - divestreams-network

  worker:
    image: ghcr.io/shooter51/divestreams-app:test
    container_name: divestreams-test-worker
    restart: unless-stopped
    command: npm run worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://divestreams:${DB_PASSWORD}@${DB_HOST}:5432/divestreams_test
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - AUTH_SECRET=${AUTH_SECRET}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-https://test.divestreams.com}
      - APP_URL=${APP_URL:-https://test.divestreams.com}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@divestreams.com}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION:-us-west-000}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - CDN_URL=${CDN_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_SERVICE_NAME=divestreams-worker
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('ioredis');const c=new r(process.env.REDIS_URL);c.ping().then(()=>{c.disconnect();process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - divestreams-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  zapier-worker:
    image: ghcr.io/shooter51/divestreams-app:test
    container_name: divestreams-test-zapier-worker
    restart: unless-stopped
    command: npm run worker:zapier
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://divestreams:${DB_PASSWORD}@${DB_HOST}:5432/divestreams_test
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('ioredis');const c=new r(process.env.REDIS_URL);c.ping().then(()=>{c.disconnect();process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - divestreams-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: divestreams-test-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 768mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - divestreams-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M

  caddy:
    image: caddy:2-alpine
    container_name: divestreams-test-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile.test:/etc/caddy/Caddyfile:ro
    depends_on:
      - app
    networks:
      - divestreams-network

  alloy:
    image: grafana/alloy:latest
    container_name: divestreams-test-alloy
    restart: unless-stopped
    command:
      - run
      - --stability.level=public-preview
      - /etc/alloy/config.alloy
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
    environment:
      - GRAFANA_MIMIR_URL=${GRAFANA_MIMIR_URL}
      - GRAFANA_MIMIR_USERNAME=${GRAFANA_MIMIR_USERNAME}
      - GRAFANA_MIMIR_API_KEY=${GRAFANA_MIMIR_API_KEY}
      - GRAFANA_TEMPO_URL=${GRAFANA_TEMPO_URL}
      - GRAFANA_TEMPO_USERNAME=${GRAFANA_TEMPO_USERNAME}
      - GRAFANA_TEMPO_API_KEY=${GRAFANA_TEMPO_API_KEY}
    networks:
      - divestreams-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

networks:
  divestreams-network:
    driver: bridge

volumes:
  redis_data:
  caddy_data:
  caddy_config:
